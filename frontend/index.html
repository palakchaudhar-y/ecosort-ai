<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoSort AI | Premium Waste Segregator</title>

<style>

:root{
--primary:#22c55e;
--primary-dark:#15803d;
--bg-color:#f0fdf4;
--text-muted:#64748b;
}

body{
font-family:'Segoe UI',Roboto,sans-serif;
background-color:var(--bg-color);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:white;
padding:2.5rem;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.05);
text-align:center;
width:90%;
max-width:420px;
}

h1{color:var(--primary-dark);margin:0 0 5px 0;font-size:1.8rem;}
p{color:var(--text-muted);margin-bottom:30px;}

.upload-area{
border:2px dashed #bbf7d0;
padding:40px 20px;
border-radius:20px;
cursor:pointer;
margin-bottom:24px;
transition:all 0.3s ease;
position:relative;
background:#fafafa;
display:flex;
justify-content:center;
align-items:center;
min-height:200px;
}

.upload-area:hover{
border-color:var(--primary);
background-color:#fff;
}

#imagePreview{
width:100%;
max-height:280px;
object-fit:contain;
border-radius:12px;
display:none;
}

#removeBtn{
position:absolute;
top:12px;
right:12px;
width:34px;
height:34px;
background:#15803d;
color:white;
border-radius:10px;
display:none;
justify-content:center;
align-items:center;
font-size:20px;
cursor:pointer;
box-shadow:0 4px 12px rgba(21,128,61,0.3);
border:2px solid white;
}

.btn{
background:var(--primary);
color:white;
border:none;
padding:16px;
border-radius:14px;
font-size:1rem;
font-weight:600;
cursor:pointer;
width:100%;
box-shadow:0 4px 12px rgba(34,197,94,0.2);
}

.btn:hover{
background:#16a34a;
}

.result-box{
margin-top:25px;
padding:20px;
border-radius:16px;
display:none;
}

.bio-result{background:#dcfce7;border:1px solid #15803d;color:#14532d;}
.non-bio-result{background:#fee2e2;border:1px solid #b91c1c;color:#7f1d1d;}

.loader{
width:24px;
height:24px;
border:3px solid #f3f3f3;
border-top:3px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
margin:15px auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

#userInputBox{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🌱 EcoSort AI</h1>
<p>AI-Powered Waste Segregation</p>

<input type="file" id="imageInput" accept="image/*" hidden>

<div class="upload-area" onclick="document.getElementById('imageInput').click()">

<div id="dropText">
<strong>Click to upload photo</strong><br>
<small>(Banana peel, bottle, etc.)</small>
</div>

<img id="imagePreview">

<span id="removeBtn">&times;</span>

</div>

<button class="btn" id="analyzeBtn">Classify Waste</button>

<div class="loader" id="loader"></div>

<div id="resultBox" class="result-box">
<h2 id="resultTitle">Analyzing...</h2>
<p id="resultDesc"></p>
</div>

<div id="userInputBox">
<p><strong>Not sure 🤔</strong> — What is this?</p>

<button onclick="setUserChoice('bio')" class="btn" style="margin-bottom:8px;">
Biodegradable
</button>

<button onclick="setUserChoice('nonbio')" class="btn" style="background:#475569;">
Non-Biodegradable
</button>

</div>

</div>

<script>

const imageInput=document.getElementById('imageInput');
const imagePreview=document.getElementById('imagePreview');
const dropText=document.getElementById('dropText');
const analyzeBtn=document.getElementById('analyzeBtn');
const resultBox=document.getElementById('resultBox');
const loader=document.getElementById('loader');
const removeBtn=document.getElementById('removeBtn');

imageInput.addEventListener('change',function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

imagePreview.src=e.target.result;
imagePreview.style.display='block';
dropText.style.display='none';
removeBtn.style.display='flex';

resultBox.style.display='none';
document.getElementById("userInputBox").style.display="none";

}

reader.readAsDataURL(file);

}

});

removeBtn.addEventListener('click',function(e){

e.stopPropagation();

imageInput.value="";
imagePreview.src="";
imagePreview.style.display='none';
dropText.style.display='block';
removeBtn.style.display='none';

resultBox.style.display='none';
document.getElementById("userInputBox").style.display="none";

});

analyzeBtn.addEventListener('click',async function(){

if(!imageInput.files[0]){
alert("Upload image first!");
return;
}

loader.style.display='block';
resultBox.style.display='none';
document.getElementById("userInputBox").style.display="none";

const formData=new FormData();
formData.append("file",imageInput.files[0]);

try{

const response=await fetch("http://localhost:8080/predict",{
method:"POST",
body:formData
});

const data=await response.json();

console.log("Prediction:",data);

loader.style.display='none';

if(data.prediction==="uncertain"){

resultBox.style.display="none";
document.getElementById("userInputBox").style.display="block";

}
else if(data.prediction==="biodegradable"){

showResult("Biodegradable","Throw in GREEN bin","bio-result");

}
else if(data.prediction==="non-biodegradable"){

showResult("Non-Biodegradable","Throw in BLUE bin","non-bio-result");

}

}catch(error){

loader.style.display='none';
alert("Error connecting to backend");
console.error(error);

}

});

function showResult(title,desc,className){

resultBox.style.display='block';
resultBox.className="result-box "+className;

document.getElementById('resultTitle').innerText=title;
document.getElementById('resultDesc').innerText=desc;

}

function setUserChoice(choice){

if(choice==='bio'){
showResult("Biodegradable (User)","Thanks for helping AI learn!","bio-result");
}
else{
showResult("Non-Biodegradable (User)","Thanks for helping AI learn!","non-bio-result");
}

document.getElementById("userInputBox").style.display="none";

}

</script>

</body>
</html>
